services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=sac_dev'
      - 'POSTGRES_PASSWORD=0818'
      - 'POSTGRES_USER=dev'
    ports:
      - '5432:5432'
  rabbitmq:
    image: 'rabbitmq:latest'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=myuser'
    ports:
      - '5672'

# Datasource H2 en memoria para pruebas
spring.datasource.url=jdbc:h2:mem:sac_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola H2 y carga inicial
spring.h2.console.enabled=false
spring.sql.init.mode=never

# Deshabilitar seguridad auto-configurada en pruebas
spring.main.allow-bean-definition-overriding=true

# JWT dummy values para contexto de pruebas
jwt.secret=Test_Secret_Key_For_JWT_MinLength32Characters_2026
jwt.expiration=3600000

# Google AI (valores dummy para evitar resolución de placeholders)
google.ai.api-key=test-api-key
google.ai.model=gemini-3-flash-preview
google.ai.temperature=0.7

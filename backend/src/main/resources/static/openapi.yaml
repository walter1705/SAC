openapi: 3.0.3

info:
  title: API del Sistema SAC de Clasificación de Solicitudes Académicas
  description: |
    API REST para el proyecto universitario SAC (Sistema de Atención y Clasificación).
    Centraliza las solicitudes académicas, las clasifica y prioriza, asigna personal,
    rastrea todo el ciclo de vida y mantiene un historial auditable.

    ## Autenticación
    Todos los endpoints (excepto login) requieren un token JWT Bearer válido.

    ## Roles
    | Rol            | Permisos                           |
    |----------------|------------------------------------|
    | ADMINISTRADOR  | Acceso total a todos los recursos  |
    | GESTOR         | Gestionar solicitudes y asignaciones |
    | CONSULTOR      | Acceso de solo lectura a solicitudes |

    ## Ciclo de Vida de Solicitudes
    ```
    REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA
    ```
    Cualquier otra transición retorna `400 Bad Request`. Las solicitudes cerradas no pueden modificarse.

    ## Reglas de Prioridad

    | Condición                              | Prioridad |
    |----------------------------------------|-----------|
    | CANCELACION cerca de fecha límite       | ALTA      |
    | HOMOLOGACION                           | ALTA      |
    | REGISTRO durante período de matrícula   | ALTA      |
    | CUPOS sin cupos disponibles            | ALTA      |
    | CONSULTA                               | BAJA      |
    | Por defecto                            | MEDIA     |

  version: 1.0.0
  contact:
    name: Equipo de Desarrollo SAC
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo local

tags:
  - name: Solicitudes
    description: Gestión de solicitudes académicas
  - name: Usuarios
    description: Gestión de usuarios y autenticación

security:
  - BearerAuth: []

paths:
  # ─────────────────────────────────────────────
  #  SOLICITUDES
  # ─────────────────────────────────────────────

  /api/v1/solicitudes:
    post:
      tags: [Solicitudes]
      summary: Crear una nueva solicitud académica
      description: |
        Registra una nueva solicitud académica en el sistema con estado `REGISTRADA`.
        **Rol requerido:** `GESTOR`
      operationId: crearSolicitud
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudBody'
            example:
              tipo: CANCELACION
              descripcion: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
              canalOrigen: SAC
              idSolicitante: '1094000001'
      responses:
        '201':
          description: Solicitud creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
              example:
                id: 1
                tipo: CANCELACION
                descripcion: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
                canalOrigen: SAC
                fechaHoraRegistro: '2026-03-01T10:30:00Z'
                idSolicitante: '1094000001'
                prioridad: null
                justificacionPrioridad: null
                estado: REGISTRADA
                observacionCierre: null
        '400':
          $ref: '#/components/responses/SolicitudIncorrecta'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '500':
          $ref: '#/components/responses/ErrorInterno'

    get:
      tags: [Solicitudes]
      summary: Listar solicitudes con filtros y paginación
      description: |
        Retorna una lista paginada de solicitudes académicas. Soporta filtrado por estado,
        tipo, prioridad y usuario asignado.
        **Rol requerido:** `CONSULTOR`
      operationId: listarSolicitudes
      security:
        - BearerAuth: []
      parameters:
        - name: estado
          in: query
          required: false
          description: Filtrar por estado de solicitud
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
        - name: tipo
          in: query
          required: false
          description: Filtrar por tipo de solicitud
          schema:
            $ref: '#/components/schemas/TipoSolicitud'
        - name: prioridad
          in: query
          required: false
          description: Filtrar por nivel de prioridad
          schema:
            $ref: '#/components/schemas/Prioridad'
        - name: responsable
          in: query
          required: false
          description: Filtrar por ID del usuario asignado
          schema:
            type: integer
            format: int64
            example: 5
        - name: page
          in: query
          required: false
          description: Número de página (basado en cero)
          schema:
            type: integer
            default: 0
            minimum: 0
            example: 0
        - name: size
          in: query
          required: false
          description: Número de elementos por página
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
            example: 20
        - name: sort
          in: query
          required: false
          description: 'Campo y dirección de ordenamiento (ej. fechaHoraRegistro,desc)'
          schema:
            type: string
            example: 'fechaHoraRegistro,desc'
      responses:
        '200':
          description: Lista paginada de solicitudes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudesPaginadasResponse'
              example:
                content:
                  - id: 1
                    tipo: CANCELACION
                    descripcion: 'Cancelación de Cálculo II'
                    canalOrigen: SAC
                    fechaHoraRegistro: '2026-03-01T10:30:00Z'
                    idSolicitante: '1094000001'
                    prioridad: ALTA
                    justificacionPrioridad: 'CANCELACION cerca de fecha límite'
                    estado: CLASIFICADA
                    observacionCierre: null
                  - id: 2
                    tipo: CONSULTA
                    descripcion: 'Consulta sobre horario académico'
                    canalOrigen: CORREO
                    fechaHoraRegistro: '2026-03-01T11:00:00Z'
                    idSolicitante: '1094000002'
                    prioridad: BAJA
                    justificacionPrioridad: 'CONSULTA por defecto es BAJA'
                    estado: REGISTRADA
                    observacionCierre: null
                pagina: 0
                tamaño: 20
                totalElementos: 2
                totalPaginas: 1
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/solicitudes/{id}:
    get:
      tags: [Solicitudes]
      summary: Obtener detalle de solicitud por ID
      description: |
        Retorna el detalle completo de una solicitud académica.
        **Rol requerido:** `CONSULTOR`
      operationId: obtenerSolicitudPorId
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdSolicitud'
      responses:
        '200':
          description: Detalle de la solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
              example:
                id: 1
                tipo: CANCELACION
                descripcion: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
                canalOrigen: SAC
                fechaHoraRegistro: '2026-03-01T10:30:00Z'
                idSolicitante: '1094000001'
                prioridad: ALTA
                justificacionPrioridad: 'CANCELACION cerca de fecha límite'
                estado: CLASIFICADA
                observacionCierre: null
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/solicitudes/{id}/clasificar:
    patch:
      tags: [Solicitudes]
      summary: Clasificar y priorizar una solicitud
      description: |
        Establece el tipo, prioridad y justificación de prioridad para una solicitud.
        Cambia el estado a `CLASIFICADA`.
        **Rol requerido:** `GESTOR`
      operationId: clasificarSolicitud
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdSolicitud'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificarSolicitudBody'
            example:
              tipo: CANCELACION
              prioridad: ALTA
              justificacionPrioridad: 'CANCELACION cerca de fecha límite – requiere atención inmediata'
      responses:
        '200':
          description: Solicitud clasificada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
              example:
                id: 1
                tipo: CANCELACION
                descripcion: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
                canalOrigen: SAC
                fechaHoraRegistro: '2026-03-01T10:30:00Z'
                idSolicitante: '1094000001'
                prioridad: ALTA
                justificacionPrioridad: 'CANCELACION cerca de fecha límite – requiere atención inmediata'
                estado: CLASIFICADA
                observacionCierre: null
        '400':
          $ref: '#/components/responses/SolicitudIncorrecta'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/solicitudes/{id}/estado:
    patch:
      tags: [Solicitudes]
      summary: Cambiar estado de solicitud
      description: |
        Transiciona una solicitud a un nuevo estado siguiendo el ciclo de vida válido:
        `REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA`.
        Cualquier transición inválida retorna `400 Bad Request`.
        **Rol requerido:** `GESTOR`
      operationId: cambiarEstadoSolicitud
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdSolicitud'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstadoBody'
            example:
              nuevoEstado: EN_ATENCION
              observacion: 'La solicitud está siendo atendida por el personal asignado'
      responses:
        '200':
          description: Estado cambiado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
              example:
                id: 1
                tipo: CANCELACION
                descripcion: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
                canalOrigen: SAC
                fechaHoraRegistro: '2026-03-01T10:30:00Z'
                idSolicitante: '1094000001'
                prioridad: ALTA
                justificacionPrioridad: 'CANCELACION cerca de fecha límite'
                estado: EN_ATENCION
                observacionCierre: null
        '400':
          description: Transición de estado inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-03-01T12:00:00Z'
                status: 400
                error: Solicitud Incorrecta
                message: 'Transición de estado inválida de REGISTRADA a EN_ATENCION'
                path: /api/v1/solicitudes/1/estado
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/solicitudes/{id}/asignar:
    post:
      tags: [Solicitudes]
      summary: Asignar un usuario responsable a una solicitud
      description: |
        Asigna un usuario como la persona responsable de una solicitud.
        El usuario debe estar activo.
        **Rol requerido:** `GESTOR`
      operationId: asignarResponsable
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdSolicitud'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarResponsableBody'
            example:
              usuarioId: 5
      responses:
        '201':
          description: Usuario asignado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignacionResponse'
              example:
                id: 10
                solicitudId: 1
                usuarioId: 5
                fechaAsignacion: '2026-03-01T14:00:00Z'
                activa: true
        '400':
          $ref: '#/components/responses/SolicitudIncorrecta'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/solicitudes/{id}/cerrar:
    patch:
      tags: [Solicitudes]
      summary: Cerrar una solicitud
      description: |
        Cierra una solicitud. La solicitud debe estar en estado `ATENDIDA`.
        Se requiere una observación de cierre. Una vez cerrada, la solicitud no puede modificarse.
        **Rol requerido:** `GESTOR`
      operationId: cerrarSolicitud
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdSolicitud'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CerrarSolicitudBody'
            example:
              observacionCierre: 'Solicitud resuelta – cancelación aprobada por el comité académico'
      responses:
        '200':
          description: Solicitud cerrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponse'
              example:
                id: 1
                tipo: CANCELACION
                descripcion: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
                canalOrigen: SAC
                fechaHoraRegistro: '2026-03-01T10:30:00Z'
                idSolicitante: '1094000001'
                prioridad: ALTA
                justificacionPrioridad: 'CANCELACION cerca de fecha límite'
                estado: CERRADA
                observacionCierre: 'Solicitud resuelta – cancelación aprobada por el comité académico'
        '400':
          description: La solicitud no está en estado ATENDIDA o falta observación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-03-01T16:00:00Z'
                status: 400
                error: Solicitud Incorrecta
                message: 'No se puede cerrar la solicitud – estado actual es EN_ATENCION, se esperaba ATENDIDA'
                path: /api/v1/solicitudes/1/cerrar
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/solicitudes/{id}/historial:
    get:
      tags: [Solicitudes]
      summary: Obtener historial completo de auditoría de una solicitud
      description: |
        Retorna el rastro de auditoría completo de todas las acciones realizadas en una solicitud,
        ordenado cronológicamente.
        **Rol requerido:** `CONSULTOR`
      operationId: obtenerHistorialSolicitud
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdSolicitud'
      responses:
        '200':
          description: Lista de entradas del historial
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialResponse'
              example:
                - id: 1
                  fechaHora: '2026-03-01T10:30:00Z'
                  accion: 'REGISTRO'
                  usuarioResponsable: 'jgarcia'
                  observaciones: 'Solicitud creada vía portal SAC'
                - id: 2
                  fechaHora: '2026-03-01T11:00:00Z'
                  accion: 'CLASIFICACION'
                  usuarioResponsable: 'jgarcia'
                  observaciones: 'Clasificada como CANCELACION con prioridad ALTA'
                - id: 3
                  fechaHora: '2026-03-01T14:00:00Z'
                  accion: 'ASIGNACION'
                  usuarioResponsable: 'mrodriguez'
                  observaciones: 'Asignada a mrodriguez para gestión'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  # ─────────────────────────────────────────────
  #  USUARIOS
  # ─────────────────────────────────────────────

  /api/v1/usuarios/login:
    post:
      tags: [Usuarios]
      summary: Autenticar usuario y obtener JWT
      description: |
        Endpoint público. Valida credenciales y retorna un token JWT Bearer
        con el rol del usuario codificado.
      operationId: iniciarSesion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IniciarSesionBody'
            example:
              username: 'jgarcia'
              password: 'S3cur3P@ss!'
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IniciarSesionResponse'
              example:
                token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
                tipo: 'Bearer'
                username: 'jgarcia'
                rol: GESTOR
                expiraEn: 3600
        '400':
          $ref: '#/components/responses/SolicitudIncorrecta'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: '2026-03-01T09:00:00Z'
                status: 401
                error: No Autorizado
                message: 'Nombre de usuario o contraseña inválidos'
                path: /api/v1/usuarios/login
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/usuarios:
    get:
      tags: [Usuarios]
      summary: Listar todos los usuarios activos
      description: |
        Retorna una lista de todos los usuarios activos del sistema.
        **Rol requerido:** `ADMINISTRADOR`
      operationId: listarUsuarios
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de usuarios activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioResponse'
              example:
                - id: 1
                  username: 'admin'
                  rol: ADMINISTRADOR
                  activo: true
                  nombre: 'Administrador del Sistema'
                - id: 5
                  username: 'jgarcia'
                  rol: GESTOR
                  activo: true
                  nombre: 'Juan García'
                - id: 8
                  username: 'mrodriguez'
                  rol: CONSULTOR
                  activo: true
                  nombre: 'María Rodríguez'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '500':
          $ref: '#/components/responses/ErrorInterno'

    post:
      tags: [Usuarios]
      summary: Crear un nuevo usuario
      description: |
        Crea una nueva cuenta de usuario en el sistema.
        **Rol requerido:** `ADMINISTRADOR`
      operationId: crearUsuario
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearUsuarioBody'
            example:
              username: 'aperez'
              password: 'N3wUs3r@2026'
              rol: GESTOR
              nombre: 'Ana Pérez'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
              example:
                id: 12
                username: 'aperez'
                rol: GESTOR
                activo: true
                nombre: 'Ana Pérez'
        '400':
          $ref: '#/components/responses/SolicitudIncorrecta'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '500':
          $ref: '#/components/responses/ErrorInterno'

  /api/v1/usuarios/{id}/estado:
    patch:
      tags: [Usuarios]
      summary: Activar o desactivar un usuario
      description: |
        Cambia el estado activo de una cuenta de usuario.
        **Rol requerido:** `ADMINISTRADOR`
      operationId: cambiarEstadoUsuario
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
            format: int64
            example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstadoUsuarioBody'
            example:
              activo: false
      responses:
        '200':
          description: Estado del usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
              example:
                id: 5
                username: 'jgarcia'
                rol: GESTOR
                activo: false
                nombre: 'Juan García'
        '400':
          $ref: '#/components/responses/SolicitudIncorrecta'
        '401':
          $ref: '#/components/responses/NoAutorizado'
        '403':
          $ref: '#/components/responses/Prohibido'
        '404':
          $ref: '#/components/responses/NoEncontrado'
        '500':
          $ref: '#/components/responses/ErrorInterno'

# ─────────────────────────────────────────────────
#  COMPONENTES
# ─────────────────────────────────────────────────

components:
  # ── Esquemas de Seguridad ─────────────────────

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido de POST /api/v1/usuarios/login

  # ── Parámetros Reutilizables ──────────────────

  parameters:
    IdSolicitud:
      name: id
      in: path
      required: true
      description: ID único de solicitud
      schema:
        type: integer
        format: int64
        example: 1

  # ── Esquemas ──────────────────────────────────

  schemas:
    # ── Enums ─────────────────────────────────

    TipoSolicitud:
      type: string
      description: Tipo de solicitud académica
      enum:
        - REGISTRO
        - HOMOLOGACION
        - CANCELACION
        - CUPOS
        - CONSULTA

    CanalOrigen:
      type: string
      description: Canal de origen por el cual se recibió la solicitud
      enum:
        - CSU
        - CORREO
        - SAC
        - TELEFONICO
        - PRESENCIAL

    Prioridad:
      type: string
      description: Nivel de prioridad asignado a la solicitud
      enum:
        - ALTA
        - MEDIA
        - BAJA

    EstadoSolicitud:
      type: string
      description: |
        Estado actual en el ciclo de vida de la solicitud.
        Transiciones válidas: REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA
      enum:
        - REGISTRADA
        - CLASIFICADA
        - EN_ATENCION
        - ATENDIDA
        - CERRADA

    RolUsuario:
      type: string
      description: Rol de usuario que determina los permisos
      enum:
        - ADMINISTRADOR
        - GESTOR
        - CONSULTOR

    # ── Cuerpos de Solicitud ──────────────────

    CrearSolicitudBody:
      type: object
      description: Payload para crear una nueva solicitud académica
      required:
        - tipo
        - descripcion
        - canalOrigen
        - idSolicitante
      properties:
        tipo:
          $ref: '#/components/schemas/TipoSolicitud'
        descripcion:
          type: string
          minLength: 10
          maxLength: 2000
          description: Descripción detallada de la solicitud académica
          example: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        idSolicitante:
          type: string
          minLength: 1
          maxLength: 50
          description: Identificador único del solicitante (ID estudiante, ID empleado, etc.)
          example: '1094000001'

    ClasificarSolicitudBody:
      type: object
      description: Payload para clasificar y establecer prioridad de una solicitud
      required:
        - tipo
        - prioridad
        - justificacionPrioridad
      properties:
        tipo:
          $ref: '#/components/schemas/TipoSolicitud'
        prioridad:
          $ref: '#/components/schemas/Prioridad'
        justificacionPrioridad:
          type: string
          minLength: 5
          maxLength: 500
          description: Justificación para el nivel de prioridad asignado
          example: 'CANCELACION cerca de fecha límite – requiere atención inmediata'

    CambiarEstadoBody:
      type: object
      description: Payload para transicionar una solicitud a un nuevo estado
      required:
        - nuevoEstado
      properties:
        nuevoEstado:
          $ref: '#/components/schemas/EstadoSolicitud'
        observacion:
          type: string
          maxLength: 1000
          description: Observación opcional sobre el cambio de estado
          example: 'La solicitud está siendo atendida por el personal asignado'

    AsignarResponsableBody:
      type: object
      description: Payload para asignar un usuario responsable a una solicitud
      required:
        - usuarioId
      properties:
        usuarioId:
          type: integer
          format: int64
          description: ID del usuario a asignar como responsable
          example: 5

    CerrarSolicitudBody:
      type: object
      description: Payload para cerrar una solicitud (requiere observación de cierre)
      required:
        - observacionCierre
      properties:
        observacionCierre:
          type: string
          minLength: 10
          maxLength: 2000
          description: Observación obligatoria explicando la resolución
          example: 'Solicitud resuelta – cancelación aprobada por el comité académico'

    IniciarSesionBody:
      type: object
      description: Credenciales para autenticación de usuario
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Nombre de usuario
          example: 'jgarcia'
        password:
          type: string
          minLength: 8
          maxLength: 100
          format: password
          description: Contraseña del usuario
          example: 'S3cur3P@ss!'

    CrearUsuarioBody:
      type: object
      description: Payload para crear una nueva cuenta de usuario
      required:
        - username
        - password
        - rol
        - nombre
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Nombre de usuario único
          example: 'aperez'
        password:
          type: string
          minLength: 8
          maxLength: 100
          format: password
          description: Contraseña (será encriptada del lado del servidor)
          example: 'N3wUs3r@2026'
        rol:
          $ref: '#/components/schemas/RolUsuario'
        nombre:
          type: string
          minLength: 2
          maxLength: 100
          description: Nombre completo para mostrar
          example: 'Ana Pérez'

    CambiarEstadoUsuarioBody:
      type: object
      description: Payload para activar o desactivar un usuario
      required:
        - activo
      properties:
        activo:
          type: boolean
          description: true para activar, false para desactivar
          example: false

    # ── Esquemas de Respuesta ─────────────────

    SolicitudResponse:
      type: object
      description: Representación completa de una solicitud académica
      properties:
        id:
          type: integer
          format: int64
          description: ID único de la solicitud
          example: 1
        tipo:
          $ref: '#/components/schemas/TipoSolicitud'
        descripcion:
          type: string
          description: Descripción detallada de la solicitud
          example: 'Estudiante solicita cancelación de Cálculo II por motivos médicos'
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
        fechaHoraRegistro:
          type: string
          format: date-time
          description: Timestamp cuando fue registrada la solicitud
          example: '2026-03-01T10:30:00Z'
        idSolicitante:
          type: string
          description: Identificador del solicitante
          example: '1094000001'
        prioridad:
          $ref: '#/components/schemas/Prioridad'
          nullable: true
        justificacionPrioridad:
          type: string
          nullable: true
          description: Justificación para la asignación de prioridad
          example: 'CANCELACION cerca de fecha límite'
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
        observacionCierre:
          type: string
          nullable: true
          description: Observación de cierre (solo presente cuando estado es CERRADA)
          example: null

    SolicitudesPaginadasResponse:
      type: object
      description: Wrapper de respuesta paginada para solicitudes
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SolicitudResponse'
        pagina:
          type: integer
          description: Número de página actual (basado en cero)
          example: 0
        tamaño:
          type: integer
          description: Número de elementos por página
          example: 20
        totalElementos:
          type: integer
          format: int64
          description: Número total de registros que coinciden
          example: 42
        totalPaginas:
          type: integer
          description: Número total de páginas
          example: 3

    HistorialResponse:
      type: object
      description: Entrada única del historial de auditoría para una solicitud
      properties:
        id:
          type: integer
          format: int64
          description: ID único de la entrada del historial
          example: 1
        fechaHora:
          type: string
          format: date-time
          description: Timestamp de la acción
          example: '2026-03-01T10:30:00Z'
        accion:
          type: string
          description: Descripción de la acción realizada
          example: 'REGISTRO'
        usuarioResponsable:
          type: string
          description: Nombre de usuario que realizó la acción
          example: 'jgarcia'
        observaciones:
          type: string
          description: Observaciones adicionales sobre la acción
          example: 'Solicitud creada vía portal SAC'

    AsignacionResponse:
      type: object
      description: Representación de una asignación solicitud-a-usuario
      properties:
        id:
          type: integer
          format: int64
          description: ID único de la asignación
          example: 10
        solicitudId:
          type: integer
          format: int64
          description: ID de la solicitud asignada
          example: 1
        usuarioId:
          type: integer
          format: int64
          description: ID del usuario asignado
          example: 5
        fechaAsignacion:
          type: string
          format: date-time
          description: Timestamp de la asignación
          example: '2026-03-01T14:00:00Z'
        activa:
          type: boolean
          description: Si esta asignación está actualmente activa
          example: true

    UsuarioResponse:
      type: object
      description: Información del usuario (la contraseña nunca se expone)
      properties:
        id:
          type: integer
          format: int64
          description: ID único del usuario
          example: 5
        username:
          type: string
          description: Nombre de usuario
          example: 'jgarcia'
        rol:
          $ref: '#/components/schemas/RolUsuario'
        activo:
          type: boolean
          description: Si la cuenta del usuario está activa
          example: true
        nombre:
          type: string
          description: Nombre completo para mostrar
          example: 'Juan García'

    IniciarSesionResponse:
      type: object
      description: Respuesta de autenticación JWT
      properties:
        token:
          type: string
          description: Token de acceso JWT
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        tipo:
          type: string
          description: Tipo de token
          example: 'Bearer'
        username:
          type: string
          description: Nombre de usuario autenticado
          example: 'jgarcia'
        rol:
          $ref: '#/components/schemas/RolUsuario'
        expiraEn:
          type: integer
          description: Tiempo de expiración del token en segundos
          example: 3600

    ErrorResponse:
      type: object
      description: Cuerpo de respuesta de error estándar
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp de ocurrencia del error
          example: '2026-03-01T12:00:00Z'
        status:
          type: integer
          description: Código de estado HTTP
          example: 400
        error:
          type: string
          description: Frase de razón del error HTTP
          example: 'Solicitud Incorrecta'
        message:
          type: string
          description: Mensaje de error detallado
          example: 'Transición de estado inválida de REGISTRADA a EN_ATENCION'
        path:
          type: string
          description: Ruta de solicitud que causó el error
          example: '/api/v1/solicitudes/1/estado'

  # ── Respuestas Reutilizables ──────────────────

  responses:
    SolicitudIncorrecta:
      description: Solicitud Incorrecta – Entrada inválida o violación de regla de negocio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-03-01T12:00:00Z'
            status: 400
            error: Solicitud Incorrecta
            message: 'Falla en validación: descripcion no debe estar en blanco'
            path: /api/v1/solicitudes

    NoAutorizado:
      description: No Autorizado – Token JWT faltante o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-03-01T12:00:00Z'
            status: 401
            error: No Autorizado
            message: 'Se requiere autenticación completa para acceder a este recurso'
            path: /api/v1/solicitudes

    Prohibido:
      description: Prohibido – Permisos de rol insuficientes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-03-01T12:00:00Z'
            status: 403
            error: Prohibido
            message: 'Acceso denegado – rol CONSULTOR no puede realizar esta acción'
            path: /api/v1/solicitudes

    NoEncontrado:
      description: No Encontrado – El recurso no existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-03-01T12:00:00Z'
            status: 404
            error: No Encontrado
            message: 'Solicitud con ID 999 no encontrada'
            path: /api/v1/solicitudes/999

    ErrorInterno:
      description: Error Interno del Servidor – Falla inesperada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-03-01T12:00:00Z'
            status: 500
            error: Error Interno del Servidor
            message: 'Ocurrió un error inesperado. Por favor intente de nuevo más tarde.'
            path: /api/v1/solicitudes
